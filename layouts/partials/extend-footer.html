<!-- PhotoSwipe JS -->
<script type="module">
  import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.js';

  const lightbox = new PhotoSwipeLightbox({
    gallery: '.prose',
    children: 'img',
    pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.js'),
  });

  // Ensure we get the full resolution dimensions
  lightbox.addFilter('itemData', (itemData, index) => {
    const img = itemData.element;
    
    // Create a new image to get true dimensions
    const fullImg = new Image();
    fullImg.src = img.src;
    
    return {
      src: img.src,
      width: fullImg.naturalWidth || img.naturalWidth || 1920,
      height: fullImg.naturalHeight || img.naturalHeight || 1080,
      alt: img.alt
    };
  });

  lightbox.init();
</script>
