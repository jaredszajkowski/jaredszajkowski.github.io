# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://jpanther.github.io/congo/docs/getting-started/

# Set theme - required due to installation from github
theme = "congo"

baseURL = "https://www.jaredszajkowski.com"
defaultContentLanguage = "en"

enableRobotsTXT = true
summaryLength = 0

# Notebook/export .html files live alongside posts and the projects-research page.
# They are copied into public/ verbatim by the PyDoit pipeline (copy_notebook_exports,
# copy_projects_research_exports), so Hugo must NOT treat them as content pages.
# (Hugo v0.158+ also blocks text/html content via security.allowContent.)
ignoreFiles = ['\.html$']

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true

[permalinks]
  [permalinks.page]
  #  posts = '/:year/:month/:day/:slug/'
    posts = '/posts/:slug/'
    pages = '/:slug/'
  #[permalinks.section]
  #  posts = '/posts/'
  #  pages = '/pages/'
  #  topics = '/'
  #[permalinks.taxonomy]
  #  topics = '/:slug/'

# Modifying image cache location for GitHub workflow
[caches]
  [caches.images]
    dir = ':cacheDir/images'
